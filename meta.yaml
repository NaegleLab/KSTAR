{% set name = "kstar" %}
{% set version = "1.0.4" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/kstar-{{ version }}.tar.gz
  sha256: 5c439ac4c6873cec8beb53684c12847448456c57b6ff8edfbdfe87ec5ff6dd4e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.9
  run:
    - biopython ==1.78.*
    - matplotlib-base ==3.8.*
    - numpy ==1.26.*
    - pandas ==2.1.*
    - python >=3.9
    - requests ==2.31.*
    - scipy ==1.11.*
    - seaborn ==0.13.*

test:
  imports:
    - kstar
    - kstar.random_experiments
    - kstar.analysis
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/NaegleLab/KSTAR
  summary: 'KSTAR: Kinase-Substrate Transfer to Activity Relationships'
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - knaegle
